<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:"Noto Sans SC",-apple-system,"Helvetica Neue",sans-serif;font-size:15px;color:#1a1a1a;background:#0f0f0f;-webkit-font-smoothing:antialiased;line-height:1.8}
.tags{padding:14px 16px 6px;display:flex;overflow-x:auto;gap:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:#0f0f0f;position:sticky;top:0;z-index:10}
.tags::-webkit-scrollbar{display:none}
.tag{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);transition:all .2s;white-space:nowrap;text-decoration:none}
.tag.on,.tag:active{background:#ff6b35;color:#fff;border-color:#ff6b35}
.container{max-width:680px;margin:0 auto;padding:0 0 60px}
.back{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.5);font-size:14px;text-decoration:none;margin:20px}
.back:hover{color:#fff}

.cat-tags{padding:0 20px 12px;display:flex;gap:8px;flex-wrap:wrap}
.ctag{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);transition:all .2s}
.ctag.on,.ctag:active{background:#ff6b35;color:#fff;border-color:#ff6b35}

.video-player{width:100%;aspect-ratio:16/9;background:#111}
.video-player video{width:100%;height:100%;object-fit:contain}
.video-info{padding:16px 20px}
.video-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
.video-meta{font-size:13px;color:rgba(255,255,255,.4)}

.video-list{padding:0 20px}
.v-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer}
.v-thumb{width:120px;height:68px;border-radius:8px;flex-shrink:0;overflow:hidden;position:relative;background:#111}
.v-thumb video{width:100%;height:100%;object-fit:cover;pointer-events:none}
.v-thumb .mini-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3)}
.v-thumb .mini-play .play-icon{width:28px;height:28px;background:rgba(255,107,53,.85);border-radius:50%;display:flex;align-items:center;justify-content:center}
.v-thumb .mini-play .play-icon svg{width:12px;height:12px;fill:#fff;margin-left:1px}
.v-text{flex:1;min-width:0}
.v-text .vt{font-size:14px;font-weight:500;color:#fff;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.v-text .vm{font-size:12px;color:rgba(255,255,255,.35)}
.footer-note{text-align:center;margin-top:40px;padding:20px;color:rgba(255,255,255,.2);font-size:13px}
</style>
</head>
<body>

</div>

<a href="knowledge.html" class="back">← 返回知识库</a>

<div class="cat-tags">
  <span class="ctag on" onclick="filterVideos('all',this)">全部</span>
  <span class="ctag" onclick="filterVideos('团购',this)">团购</span>
  <span class="ctag" onclick="filterVideos('外卖运营',this)">外卖运营</span>
  <span class="ctag" onclick="filterVideos('套餐设计',this)">套餐设计</span>
</div>

<div class="video-player">
  <video id="mainVideo" src="images/video1.mp4" controls playsinline webkit-playsinline preload="metadata"></video>
</div>

<div class="video-info">
  <div class="video-title" id="videoTitle">为什么套餐没人买？三个坑你可能全踩了</div>
  <div class="video-meta" id="videoMeta">2分05秒 · 3个真实案例</div>
</div>

<div class="video-list" id="videoList">
  <div class="v-item" data-cat="外卖运营" onclick="switchVideo('images/video2.mp4','外卖店三招七天从16单拉爆到199单实战教学','9分28秒 · 外卖运营');scrollToTop()">
    <div class="v-thumb">
      <video src="images/video2.mp4" preload="metadata" muted playsinline></video>
      <div class="mini-play"><div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
    </div>
    <div class="v-text"><div class="vt">外卖店三招七天从16单拉爆到199单实战教学</div><div class="vm">9分28秒 · 外卖运营</div></div>
  </div>
  <div class="v-item" data-cat="团购 套餐设计" onclick="switchVideo('images/video1.mp4','为什么套餐没人买？三个坑你可能全踩了','2分05秒 · 团购');scrollToTop()">
    <div class="v-thumb">
      <video src="images/video1.mp4" preload="metadata" muted playsinline></video>
      <div class="mini-play"><div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
    </div>
    <div class="v-text"><div class="vt">为什么套餐没人买？三个坑你可能全踩了</div><div class="vm">2分05秒 · 团购</div></div>
  </div>
</div>

<div class="footer-note">餐饮增长实验室 · 增长案例</div>

<script>
function switchVideo(src, title, meta) {
  var v = document.getElementById('mainVideo');
  v.src = src;
  v.load();
  v.play();
  document.getElementById('videoTitle').textContent = title;
  document.getElementById('videoMeta').textContent = meta;
}
function scrollToTop() {
  window.scrollTo({top:0,behavior:'smooth'});
}
function filterVideos(cat, el) {
  document.querySelectorAll('.ctag').forEach(function(t){t.classList.remove('on')});
  el.classList.add('on');
  document.querySelectorAll('.v-item').forEach(function(item){
    item.style.display = (cat==='all' || item.dataset.cat.indexOf(cat)>=0) ? 'flex' : 'none';
  });
}
</script>
