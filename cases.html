<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{font-family:"Noto Sans SC",-apple-system,"Helvetica Neue",sans-serif;font-size:15px;color:#1a1a1a;background:#0f0f0f;-webkit-font-smoothing:antialiased;line-height:1.8}
.tags{padding:14px 16px 6px;display:flex;overflow-x:auto;gap:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:#0f0f0f;position:sticky;top:0;z-index:10}

.tag{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);transition:all .2s;white-space:nowrap;text-decoration:none}

.video-player{width:100%;aspect-ratio:16/9;background:#1a1a1a;position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer}
.video-player .play-btn{width:64px;height:64px;background:rgba(255,107,53,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .2s}

.v-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);text-decoration:none;color:inherit}
.v-thumb{width:120px;aspect-ratio:16/9;background:#1a1a1a;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.v-thumb .mini-play{width:32px;height:32px;background:rgba(255,107,53,.85);border-radius:50%;display:flex;align-items:center;justify-content:center}
.v-thumb .mini-play svg{width:14px;height:14px;fill:#fff;margin-left:2px}

.v-text .vt{font-size:14px;font-weight:500;color:#fff;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.v-text .vm{font-size:12px;color:rgba(255,255,255,.35)}
.footer-note{text-align:center;margin-top:40px;padding:20px;color:rgba(255,255,255,.2);font-size:13px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:none;align-items:center;justify-content:center}
.modal.on{display:flex}
.modal-inner{background:#1a1a1a;border-radius:16px;padding:32px 24px;text-align:center;max-width:320px;width:90%}
.modal-icon{font-size:48px;margin-bottom:16px}
.modal-msg{color:#fff;font-size:16px;font-weight:600;margin-bottom:8px}
.modal-sub{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:20px}
.modal-close{display:inline-block;padding:12px 32px;background:#ff6b35;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.login-gate{position:fixed;inset:0;background:#0f0f0f;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column}
.login-gate.hidden{display:none}
.login-box{text-align:center;padding:40px 24px;max-width:320px;width:100%}
.login-logo{font-size:28px;font-weight:700;color:#fff;letter-spacing:.08em;margin-bottom:8px}
.login-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:32px}
.login-input{width:100%;padding:14px 18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-size:16px;text-align:center;outline:none;margin-bottom:16px;letter-spacing:.2em}
.login-input:focus{border-color:#ff6b35}
.login-input::placeholder{color:rgba(255,255,255,.2);letter-spacing:0}
.login-btn{width:100%;padding:14px;background:#ff6b35;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.login-btn:active{background:#e55a2b}
.login-err{color:#ff4444;font-size:13px;margin-top:12px;display:none}
</style>

<div class="login-gate" id="loginGate">
  <div class="login-box">
    <div class="login-logo">餐饮增长实验室</div>
    <div class="login-sub">请输入访问密码</div>
    <input type="password" class="login-input" id="pwdInput" placeholder="输入密码" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="login-btn" onclick="checkPwd()">进入</button>
    <div class="login-err" id="loginErr">密码错误，请重试</div>
  </div>
</div>
<script>
var WEEK_PWDS=['177','277','377','477','577','677','777'];
var SITE_PWD=WEEK_PWDS[new Date().getDay()===0?6:new Date().getDay()-1];
(function(){
  if(localStorage.getItem('_site_auth')===SITE_PWD){
    var g=document.getElementById('loginGate');
    if(g)g.classList.add('hidden');
  }
})();
function checkPwd(){
  var v=document.getElementById('pwdInput').value.trim();
  if(v===SITE_PWD){
    localStorage.setItem('_site_auth',SITE_PWD);
    document.getElementById('loginGate').classList.add('hidden');
    document.getElementById('loginErr').style.display='none';
  }else{
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwdInput').value='';
  }
}
</script>
