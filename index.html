<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>餐饮增长实验室</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Noto Sans SC",-apple-system,"Helvetica Neue",sans-serif;
  font-size:14px;color:#1a1a1a;
  background:#F7F7F7;
  -webkit-font-smoothing:antialiased;
}
.hero{
  width:100%;min-height:100vh;min-height:100svh;
  display:flex;align-items:center;justify-content:center;
  padding:48px 24px;
}
.hero-inner{text-align:center;max-width:360px}
.hero-title{font-size:28px;font-weight:700;color:#1a1a1a;letter-spacing:.04em;margin-bottom:12px;line-height:1.3}
.hero-sub{font-size:15px;color:#666;line-height:1.8;margin-bottom:32px}
.hero-divider{width:40px;height:2px;background:#ccc;margin:0 auto 32px}
.hero-note{font-size:13px;color:#999;line-height:2;margin-bottom:20px}
.hero-highlight{font-weight:600;color:#e65100}
</style>
</head>
<body>
<section class="hero">
  <div class="hero-inner">
    <h1 class="hero-title">餐饮增长实验室</h1>
    <p class="hero-sub">每天一个增长方案<br>让餐饮老板少走弯路</p>
    <div class="hero-divider"></div>
    <div class="hero-note">
      不是AI网站<br>
      而是：<br>
      <span class="hero-highlight">专门帮助餐饮老板提高营业额</span><br>
      AI只是你的幕后生产工具
    </div>
  </div>
</section>
</body>
</html>
