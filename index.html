<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>餐饮增长实验室</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Noto Sans SC",-apple-system,"Helvetica Neue",sans-serif;
  font-size:14px;color:#fff;
  background:#0f0f0f;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.bg{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 50% 30%, #1a1a2e 0%, #0f0f0f 60%);
}
.bg::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 50%, rgba(255,107,53,.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255,193,7,.06) 0%, transparent 50%),
    radial-gradient(circle at 60% 80%, rgba(255,107,53,.05) 0%, transparent 50%);
}
.bg-dots{
  position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.03) 1px, transparent 1px);
  background-size:40px 40px;
}

.page{
  position:relative;z-index:1;
  width:100%;min-height:calc(100vh - 60px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:36px 24px 48px;
}
.hero-inner{text-align:center;max-width:360px}
.hero-badge{
  display:inline-block;
  padding:6px 16px;border:1px solid rgba(255,255,255,.15);
  border-radius:20px;font-size:12px;color:rgba(255,255,255,.6);
  letter-spacing:.1em;margin-bottom:24px;
}
.hero-title{
  font-size:30px;font-weight:700;color:#fff;
  letter-spacing:.06em;margin-bottom:16px;line-height:1.3;
}
.hero-sub{font-size:15px;color:rgba(255,255,255,.6);line-height:1.8;margin-bottom:36px}
.hero-divider{width:40px;height:1px;background:rgba(255,255,255,.2);margin:0 auto 36px}
.hero-note{font-size:13px;color:rgba(255,255,255,.45);line-height:2.2;margin-bottom:32px}
.hero-highlight{color:#ff6b35;font-weight:600}

.hero-btn{
  display:inline-block;
  padding:14px 36px;
  background:#ff6b35;
  color:#fff;
  font-size:15px;font-weight:600;
  border-radius:8px;
  letter-spacing:.04em;
  transition:all .2s;
  text-decoration:none;
}
.hero-btn:active{background:#e55a2b;transform:scale(.97)}
</style>
</head>
<body>

<!-- 侧边入口 -->
<a href="#" style="position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:100;writing-mode:vertical-rl;background:#ff6b35;color:#fff;padding:16px 10px;border-radius:8px 0 0 8px;font-size:14px;font-weight:600;letter-spacing:.08em;text-decoration:none;box-shadow:-2px 0 12px rgba(255,107,53,.3);">活动模板</a>
<div class="bg"><div class="bg-dots"></div></div>


<div class="page">
  <div class="hero-inner">
    <div class="hero-badge">RESTAURANT GROWTH LAB</div>
    <h1 class="hero-title">餐饮增长实验室</h1>
    <p class="hero-sub">每天一个增长方案<br>让餐饮老板少走弯路</p>
    <div class="hero-divider"></div>
    <div class="hero-note">
      不是AI网站<br>
      而是：<br>
      <span class="hero-highlight">专门帮助餐饮老板提高营业额</span><br>
      AI只是你的幕后生产工具
    </div>
    <a href="article1.html" class="hero-btn">查看今日方案 →</a>
  </div>
</div>
</body>
</html>
