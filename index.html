<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIZHIGANG</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="#" class="logo-area">
                <img src="images/logo.jpg" alt="LIZHIGANG" class="logo-img">
                <span class="logo-text">LIZHIGANG</span>
            </a>
            <button class="btn-icon cart-btn" onclick="toggleCart()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <!-- 品牌区：模特背景 -->
    <section class="brand-hero">
        <div class="brand-overlay"></div>
        <div class="brand-content">
            <img src="images/logo.jpg" alt="LIZHIGANG" class="brand-logo">
            <h1 class="brand-name">LIZHIGANG</h1>
        </div>
    </section>

    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>购物袋</h3>
            <button class="btn-close" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items" id="cartItems">
            <p class="cart-empty">购物袋是空的</p>
        </div>
        <div class="cart-footer" id="cartFooter" style="display:none">
            <div class="cart-total">
                <span>合计</span>
                <span class="total-price" id="cartTotal">¥0.00</span>
            </div>
            <button class="btn btn-dark btn-full" onclick="checkout()">结算</button>
        </div>
    </div>

    <section class="category-bar">
        <div class="container">
            <div class="category-tabs" id="categoryTabs"></div>
        </div>
    </section>

    <section class="products">
        <div class="container">
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <span class="footer-brand">LIZHIGANG</span>
                <span class="footer-divider">—</span>
                <span>客服微信：njknjk22002</span>
            </div>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
