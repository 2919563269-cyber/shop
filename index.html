<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LIZHIGANG</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Noto Sans SC",-apple-system,"Helvetica Neue",sans-serif;
  font-size:14px;color:#1a1a1a;
  background:#F7F7F7;
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%;display:block;height:auto}

/* 封面 */
.hero{
  width:100%;
  height:100vh;height:100svh;
  background:url("images/lv-bg.jpg") center/cover no-repeat;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.hero::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.35)}
.hero-text{text-align:center;z-index:1;padding:0 32px}
.hero-title{font-family:"Times New Roman","Noto Serif SC",serif;font-size:36px;font-weight:400;color:#fff;letter-spacing:.3em;text-shadow:0 2px 8px rgba(0,0,0,.3);text-transform:uppercase}
</style>
</head>
<body>
<section class="hero">
  <div class="hero-text">
    <h1 class="hero-title">LIZHIGANG</h1>
  </div>
</section>
</body>
</html>
