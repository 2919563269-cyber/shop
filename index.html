<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>餐饮增长实验室</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:"Noto Sans SC",-apple-system,"Helvetica Neue",sans-serif;font-size:14px;color:#fff;background:#0f0f0f;-webkit-font-smoothing:antialiased}

.login-input{width:100%;max-width:260px;padding:12px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:15px;text-align:center;outline:none;margin-bottom:12px;letter-spacing:.2em}
.login-input:focus{border-color:#ff6b35}
.login-input::placeholder{color:rgba(255,255,255,.25);letter-spacing:0}
.login-btn{width:100%;max-width:260px;padding:12px;background:#ff6b35;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.login-btn:active{background:#e55a2b}
.login-err{color:#ff6b35;font-size:12px;margin-top:8px;display:none}
.login-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:16px;letter-spacing:.04em}
</style>
</head>
<body>

<div style="width:100%;min-height:100vh;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;background:url('images/chef-bg.jpg') center/cover no-repeat;position:relative;overflow:hidden;">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,.55);"></div>
  <div style="position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.03) 1px, transparent 1px);background-size:40px 40px;"></div>

  <div style="display:inline-block;padding:6px 16px;border:1px solid rgba(255,255,255,.15);border-radius:20px;font-size:12px;color:rgba(255,255,255,.6);letter-spacing:.1em;margin-bottom:24px;position:relative;z-index:1;">RESTAURANT GROWTH LAB</div>
  <h1 style="font-size:28px;font-weight:700;color:#fff;letter-spacing:.04em;margin-bottom:6px;line-height:1.3;position:relative;z-index:1;">餐饮增长实验室</h1>
  <p style="font-size:13px;color:rgba(255,255,255,.4);letter-spacing:.06em;margin-bottom:24px;position:relative;z-index:1;">Restaurant Growth Lab</p>
  <p style="font-size:16px;color:#ff6b35;font-weight:500;line-height:1.8;margin-bottom:40px;position:relative;z-index:1;">每天一个增长方案<br>让餐饮老板少走弯路</p>
  <div style="width:40px;height:1px;background:rgba(255,255,255,.15);margin:0 auto 40px;position:relative;z-index:1;"></div>
  <p style="font-size:14px;color:rgba(255,255,255,.5);line-height:2.2;margin-bottom:8px;position:relative;z-index:1;">不是AI网站</p>
  <p style="font-size:15px;color:#ff6b35;font-weight:600;line-height:2.2;margin-bottom:8px;position:relative;z-index:1;">专门帮助餐饮老板提高营业额</p>
  <p style="font-size:13px;color:rgba(255,255,255,.35);line-height:2.2;margin-bottom:48px;position:relative;z-index:1;">AI只是你的幕后生产工具</p>

  <div style="position:relative;z-index:1;">
    <div class="login-sub">请输入访问密码</div>
    <input type="password" class="login-input" id="pwdInput" placeholder="密码" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="login-btn" onclick="checkPwd()">进入知识库</button>
    <div class="login-err" id="loginErr">密码错误</div>
  </div>
</div>

<script>
var WEEK_PWDS=['177','277','377','477','577','677','777'];
var SITE_PWD=WEEK_PWDS[new Date().getDay()===0?6:new Date().getDay()-1];
(function(){
  var today=new Date().toDateString();
  if(localStorage.getItem('_site_auth')===SITE_PWD && localStorage.getItem('_site_day')===today){
    location.href='knowledge.html';
  }
})();
function checkPwd(){
  if(document.getElementById('pwdInput').value.trim()===SITE_PWD){
    localStorage.setItem('_site_auth',SITE_PWD);
    localStorage.setItem('_site_day',new Date().toDateString());
    location.href='knowledge.html';
  }else{
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwdInput').value='';
  }
}
</script>
</body>
</html>
