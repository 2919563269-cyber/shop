<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LIZHIGANG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Noto Sans SC",-apple-system,"Helvetica Neue",sans-serif;
  font-size:14px;color:#1a1a1a;
  background:#F7F7F7;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  width:100%;
}
img{max-width:100%;display:block;height:auto}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-appearance:none;-webkit-tap-highlight-color:transparent}
a{text-decoration:none;color:inherit}

/* ===== 模特图 ===== */
/* ===== 模特图文字 ===== */
.hero{display:flex;align-items:center;justify-content:center}
.hero-text{text-align:center;z-index:1;padding:0 32px}
.hero-title{font-family:"Times New Roman","Noto Serif SC",serif;font-size:32px;font-weight:400;color:#fff;letter-spacing:.2em;margin-bottom:12px;text-shadow:0 2px 8px rgba(0,0,0,.3);text-transform:uppercase}
.hero-sub{font-size:13px;font-weight:300;color:rgba(255,255,255,.85);letter-spacing:.2em;margin-bottom:20px;text-transform:uppercase}
.hero-desc{font-size:14px;font-weight:300;color:rgba(255,255,255,.75);line-height:1.8;letter-spacing:.04em;margin-bottom:32px}
.hero-btn{display:inline-block;padding:14px 40px;border:1px solid rgba(255,255,255,.6);color:#fff;font-size:13px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;transition:all .3s}
.hero-btn:active{background:rgba(255,255,255,.15);border-color:#fff}
.hero{
  width:100%;
  height:100vh;height:100svh;
  background:url("images/lv-bg.jpg") center/cover no-repeat;
  position:relative;
}
.hero::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.2)}

/* ===== 顶部导航 ===== */
.header{
  position:sticky;position:-webkit-sticky;top:0;z-index:100;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  height:52px;display:flex;align-items:center;
  border-bottom:1px solid rgba(0,0,0,.06);
  width:100%;
}
.hdr-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;width:100%;
}
.logo{display:flex;align-items:center;gap:8px}
.logo img{width:32px;height:32px;border-radius:50%;object-fit:contain}
.logo span{font-size:17px;font-weight:700;letter-spacing:.12em;color:#111}
.cart-btn{position:relative;padding:4px;color:#111}
.cart-btn svg{width:22px;height:22px}
.cart-num{
  position:absolute;top:-2px;right:-6px;
  background:#111;color:#fff;
  font-size:10px;font-weight:600;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}

/* ===== 分类导航 ===== */
.cats{
  position:sticky;position:-webkit-sticky;top:52px;z-index:99;
  background:#fff;border-bottom:1px solid rgba(0,0,0,.05);
  width:100%;
}
.cats-row{
  display:flex;overflow-x:auto;
  padding:0 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.cats-row::-webkit-scrollbar{display:none}
.ctab{
  flex-shrink:0;padding:14px 16px;
  font-size:14px;font-weight:400;color:#888;white-space:nowrap;
  transition:color .3s;letter-spacing:.04em;
}
.ctab.on{color:#111;font-weight:600;position:relative}
.ctab.on::after{
  content:"";position:absolute;bottom:0;left:16px;right:16px;
  height:2px;background:#111;
}

/* ===== 商品区域 ===== */
.products{padding:0 16px 16px;background:#F7F7F7;min-height:60vh}
.grid{
  display:grid;
  grid-template-columns:calc((100% - 12px)/2) calc((100% - 12px)/2);
  gap:12px;
}

/* ===== 商品卡片 ===== */
.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  transition:box-shadow .3s;
}
.card:active{box-shadow:0 2px 8px rgba(0,0,0,.08)}

.card-img{
  width:100%;
  aspect-ratio:4/5;
  background:#f5f5f5;
  position:relative;
  overflow:hidden;
}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-tag{
  position:absolute;top:8px;left:8px;
  background:#111;color:#fff;
  font-size:10px;font-weight:500;letter-spacing:.04em;
  padding:3px 8px;
}

.card-info{padding:12px 10px 14px}

.card-name{
  font-size:16px;font-weight:500;color:#111;
  line-height:1.4;letter-spacing:.02em;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
  margin-bottom:8px;
}

.card-price{
  font-size:20px;font-weight:700;color:#111;
  display:flex;align-items:baseline;gap:6px;
  margin-bottom:10px;
}
.card-price s{font-size:12px;font-weight:400;color:#aaa}

.card-btn{
  display:flex;align-items:center;justify-content:center;
  width:100%;height:44px;
  font-size:13px;font-weight:500;letter-spacing:.04em;
  color:#fff;background:#111;
  transition:background .3s;
}
.card-btn:active{background:#333}
.card-btn.in{background:#555;color:#ccc}

/* ===== 底部 ===== */
.footer{
  background:#111;color:#fff;
  padding:28px 16px 36px;
  text-align:center;font-size:13px;letter-spacing:.06em;
}

/* ===== 购物车 ===== */
.co{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none}
.co.on{display:block}
.cp{
  position:fixed;top:0;right:-100%;
  width:85vw;max-width:380px;
  height:100vh;height:100svh;
  background:#fff;z-index:201;
  display:flex;flex-direction:column;
  transition:right .3s;
}
.cp.on{right:0}
.cp-top{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #eee}
.cp-top h3{font-size:16px;font-weight:600}
.cp-top button{font-size:22px;color:#999;padding:0}
.cp-list{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.cp-empty{text-align:center;color:#999;padding-top:60px;font-size:14px}
.ci{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0;align-items:flex-start}
.ci-img{width:64px;height:80px;flex-shrink:0;background:#f5f5f5}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:500;color:#111;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ci-price{font-size:14px;font-weight:600;color:#111;margin-bottom:4px}
.ci-qty{display:flex;align-items:center;gap:8px}
.ci-qty button{width:24px;height:24px;border:1px solid #ddd;font-size:14px;display:flex;align-items:center;justify-content:center}
.ci-qty span{font-size:13px;min-width:20px;text-align:center}
.ci-del{font-size:20px;color:#ccc;padding:2px}
.cp-bottom{padding:16px;border-top:1px solid #eee}
.cp-row{display:flex;justify-content:space-between;align-items:center;font-size:15px;margin-bottom:14px}
.cp-price{font-size:20px;font-weight:700;color:#111}
.cp-bottom>button{display:block;width:100%;height:48px;background:#111;color:#fff;font-size:15px;font-weight:500;letter-spacing:.06em}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%)translateY(20px);
  background:#111;color:#fff;
  padding:12px 24px;font-size:13px;letter-spacing:.04em;
  border-radius:4px;z-index:300;
  opacity:0;transition:all .3s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%)translateY(0)}

/* ===== 支付弹窗 ===== */
.pay-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none}
.pay-overlay.on{display:block}
.pay-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a1a;border-radius:16px;z-index:501;width:94vw;max-width:430px;padding:24px 14px 20px;display:none}
.pay-box.on{display:block}
.pay-close{position:absolute;top:10px;right:14px;color:#999;font-size:24px;padding:0}
.pay-title{font-size:18px;font-weight:600;color:#fff;text-align:center;margin-bottom:16px;letter-spacing:.04em}
.pay-qr-row{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.pay-qr{text-align:center;flex:1}
.pay-qr .qr-img{display:inline-block;padding:10px;background:#fff;border-radius:12px;margin-bottom:8px}
.pay-qr .qr-img img{width:140px;height:140px;display:block}
.pay-qr .qr-label{font-size:13px;font-weight:600;color:#fff;margin-bottom:4px}
.pay-qr .qr-hint{font-size:11px;color:#999;margin-bottom:4px}
.pay-qr .qr-amount{font-size:18px;font-weight:700;color:#fff}
.pay-qr-amount{text-align:center;font-size:20px;font-weight:700;color:#fff;margin-bottom:10px}
.pay-note{text-align:center;padding-top:14px;border-top:1px solid #333;margin-top:4px}
.pay-note p{font-size:12px;color:#999;line-height:1.8}
.pay-note strong{color:#fff}


/* ===== 图片画廊 ===== */
.pd-gallery{position:relative;width:100%;aspect-ratio:4/5;border-radius:12px;overflow:hidden;margin-bottom:16px}
.pd-gallery .slides{display:flex;height:100%;transition:transform .3s;touch-action:pan-y}
.pd-gallery .slides img{width:100%;height:100%;object-fit:cover;flex-shrink:0}
.pd-dots{display:flex;justify-content:center;gap:6px;position:absolute;bottom:12px;left:50%;transform:translateX(-50%)}
.pd-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);transition:all .2s}
.pd-dot.on{background:#fff;width:20px;border-radius:4px}
.pd-prev,.pd-next{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.8);border:none;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;color:#333}
.pd-prev{left:8px}.pd-next{right:8px}
/* ===== 商品详情弹窗 ===== */
.pd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:600;display:none}
.pd-overlay.on{display:flex;align-items:flex-end;justify-content:center}
.pd-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;padding:20px 16px 30px;position:relative;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pd-close{position:absolute;top:12px;right:16px;color:#999;font-size:28px;padding:0;z-index:2}
.pd-img{width:100%;border-radius:12px;margin-bottom:16px;aspect-ratio:4/5;object-fit:cover}
.pd-name{font-size:22px;font-weight:600;color:#111;margin-bottom:8px;line-height:1.3}
.pd-desc{font-size:14px;color:#666;margin-bottom:16px;line-height:1.6}
.pd-price{font-size:28px;font-weight:700;color:#111;margin-bottom:20px}
.pd-price s{font-size:16px;color:#999;margin-left:8px;font-weight:400}
.pd-btn{display:block;width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;letter-spacing:.04em}
.pd-btn.in{background:#555}
/* ===== 尺码选择 ===== */
.pd-sizes{margin-bottom:16px}
.pd-sizes-label{font-size:13px;color:#666;margin-bottom:8px}
.pd-sizes-row{display:flex;flex-wrap:wrap;gap:8px}
.pd-size{min-width:44px;height:36px;padding:0 12px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;color:#333;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.pd-size.on{border-color:#111;background:#111;color:#fff}


/* 桌面居中 */
@media(min-width:431px){
  body{max-width:430px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,.12)}
}
</style>

];
var catList=["all","卫衣","外套","裤子","鞋子","帽子","短袖"];
function getCategories(){return catList}
var cart=JSON.parse(localStorage.getItem("sc")||"[]"),cur="all";
function init(){renderCats();renderProds("all");updateCart()}
function renderCats(){
  var t="";catList.forEach(function(c){t+='<button class="ctab'+(c==="all"?" on":"")+'" data-c="'+c+'">'+(c==="all"?"全部":c)+'</button>'});
  document.getElementById("categoryTabs").innerHTML=t;
  document.querySelectorAll(".ctab").forEach(function(b){b.onclick=function(){
    document.querySelectorAll(".ctab").forEach(function(x){x.classList.remove("on")});
    this.classList.add("on");cur=this.dataset.c;renderProds(cur)
  }})
}
function cardHTML(p){
  var i=cart.find(function(c){return c.id===p.id});
  return'<div class="card" onclick="showDetail('+p.id+')"><div class="card-img">'+
    (p.img?'<img src="'+p.img+'" alt="'+p.name+'" loading="lazy" onerror="this.parentElement.textContent=\'.\'">':'')+
    (p.tag?'<span class="card-tag">'+p.tag+'</span>':'')+
    '</div><div class="card-info">'+
    '<div class="card-name">'+p.name+'</div>'+
    '<div class="card-price">¥'+p.price+'<s>¥'+p.orig+'</s></div>'+
    '<button class="card-btn'+(i?' in':'')+'" onclick="addCart('+p.id+',this)">'+(i?'已添加':'加入购物袋')+'</button>'+
    '</div></div>'
}
function renderProds(cat){
  var l=cat==="all"?products:products.filter(function(p){return p.cat===cat});
  document.getElementById("productsGrid").innerHTML=l.map(cardHTML).join("")
}
function addCartSize(id,btn){
  var o=document.getElementById("pdOverlay");
  var size=o&&o._selSize?o._selSize:"均码";
  addCart(id,btn,size);
}
function addCart(id,btn,size){
  var p=products.find(function(x){return x.id===id});if(!p)return;
  var sz=size||"";
  var ex=cart.find(function(c){return c.id===id&&c.size===sz});
  if(ex){ex.qty++;save();updateCart();renderProds(cur);btn.textContent="已添加";btn.classList.add("in");return}
  cart.push({id:id,qty:1,size:sz});
  save();updateCart();renderProds(cur);toast(p.name+(sz?" ("+sz+")":"")+" 已加入购物袋")
}
function removeCart(id){cart=cart.filter(function(c){return c.id!==id});save();updateCart();renderProds(cur);renderCartItems()}
function chgQty(id,d){var c=cart.find(function(x){return x.id===id});if(!c)return;c.qty+=d;if(c.qty<=0){removeCart(id);return}save();updateCart();renderCartItems()}
function save(){localStorage.setItem("sc",JSON.stringify(cart))}
function updateCart(){
  var n=cart.reduce(function(s,c){return s+c.qty},0),el=document.getElementById("cartCount");
  el.textContent=n;el.style.display=n>0?"flex":"none";renderCartItems()
}
function renderCartItems(){
  var items=document.getElementById("cartItems"),ft=document.getElementById("cartFooter");
  if(cart.length===0){items.innerHTML='<p class="cp-empty">购物袋是空的</p>';ft.style.display="none";return}
  ft.style.display="block";
  var total=cart.reduce(function(s,c){var p=products.find(function(x){return x.id===c.id});return s+(p?p.price*c.qty:0)},0);
  document.getElementById("cartTotal").textContent="¥"+total.toLocaleString("zh-CN");
  items.innerHTML=cart.map(function(c){
    var p=products.find(function(x){return x.id===c.id});if(!p)return"";
    return'<div class="ci"><div class="ci-img">'+(p.img?'<img src="'+p.img+'" alt="'+p.name+'" loading="lazy">':'')+'</div><div class="ci-info"><div class="ci-name">'+p.name+'</div><div class="ci-price">¥'+(p.price*c.qty).toLocaleString()+'</div><div class="ci-qty"><button onclick="chgQty('+c.id+',-1)">−</button><span>'+c.qty+'</span><button onclick="chgQty('+c.id+',1)">+</button></div></div><button class="ci-del" onclick="removeCart('+c.id+')">&times;</button></div>'
  }).join("")
}
function toggleCart(){
  var p=document.getElementById("cartPanel"),o=document.getElementById("cartOverlay");
  if(p.classList.contains("on")){p.classList.remove("on");o.classList.remove("on")}
  else{p.classList.add("on");o.classList.add("on")}
}
function checkout(){if(cart.length===0)return;toggleCart();showPay()}
var tt;function toast(m){clearTimeout(tt);var e=document.getElementById("toast");e.textContent=m;e.className="toast";void e.offsetWidth;e.classList.add("show");tt=setTimeout(function(){e.classList.remove("show")},2500)}
document.addEventListener("DOMContentLoaded",init);

function showPay(){
  var total=cart.reduce(function(s,c){var p=products.find(function(x){return x.id===c.id});return s+(p?p.price*c.qty:0)},0);
  var o=document.createElement("div");o.className="pay-overlay on";o.id="payOverlay";
  o.innerHTML='<div class="pay-box on"><button class="pay-close" onclick="closePay()">&times;</button><div class="pay-title">选择支付方式</div><div class="pay-qr-row"><div class="pay-qr"><div class="qr-img"><img src="images/alipay.jpg" alt="支付宝"></div><div class="qr-label">支付宝</div><div class="qr-hint">请使用支付宝扫一扫</div></div><div class="pay-qr"><div class="qr-img"><img src="images/wechat-pay.jpg" alt="微信支付"></div><div class="qr-label">微信支付</div><div class="qr-hint">请使用微信扫一扫</div></div></div><div class="pay-qr-amount">应付金额：¥'+total.toLocaleString("zh-CN")+'</div><div class="pay-note"><p>支付遇到问题？联系客服微信：<strong style="color:#07C160">njknjk22002</strong></p></div></div>';
  document.body.appendChild(o);
  o.onclick=function(e){if(e.target===o)closePay()}
}
function showDetail(id){
  var p=products.find(function(x){return x.id===id});if(!p)return;
  var i=cart.find(function(c){return c.id===id});
  var imgs=p.imgs&&p.imgs.length?p.imgs:[p.img];
  var sizes=p.sizes&&p.sizes.length?p.sizes:["均码"];
  var dots='',sizeBtns='';
  for(var j=0;j<imgs.length;j++){dots+='<span class="pd-dot'+(j===0?' on':'')+'"></span>';}
  for(var k=0;k<sizes.length;k++){sizeBtns+='<span class="pd-size'+(k===0?' on':'')+'" data-size="'+sizes[k]+'" onclick="selSize(this)">'+sizes[k]+'</span>';}
  var o=document.createElement("div");o.className="pd-overlay on";o.id="pdOverlay";
  o.innerHTML='<div class="pd-box"><button class="pd-close" onclick="closeDetail()">&times;</button><div class="pd-gallery"><div class="slides" id="pdSlides">'+imgs.map(function(img,j){return'<img src="'+img+'" alt="'+p.name+'">';}).join('')+'</div><div class="pd-dots" id="pdDots">'+dots+'</div><button class="pd-prev" onclick="slidePd(-1)">&lsaquo;</button><button class="pd-next" onclick="slidePd(1)">&rsaquo;</button></div><div class="pd-name">'+p.name+'</div><div class="pd-desc">'+p.desc+'</div><div class="pd-sizes"><div class="pd-sizes-label">尺码</div><div class="pd-sizes-row" id="pdSizes">'+sizeBtns+'</div></div><div class="pd-price">¥'+p.price+'<s>¥'+p.orig+'</s></div><button class="pd-btn'+(i?' in':'')+'" onclick="addCartSize('+p.id+',this)">'+(i?'已添加':'加入购物袋')+' — ¥'+p.price+'</button></div>';
  document.body.appendChild(o);
  o._slideIdx=0;o._slideCount=imgs.length;o._selSize=sizes[0];
  o.onclick=function(e){if(e.target===o)closeDetail()}
}
function selSize(el){
  var o=document.getElementById("pdOverlay");if(!o)return;
  var size=el.dataset.size;
  document.querySelectorAll("#pdSizes .pd-size").forEach(function(s){s.classList.remove("on")});
  el.classList.add("on");o._selSize=size;
}
function slidePd(dir){
  var o=document.getElementById("pdOverlay");if(!o)return;
  var count=o._slideCount;if(!count||count<=1)return;
  o._slideIdx=(o._slideIdx+dir+count)%count;
  document.getElementById("pdSlides").style.transform='translateX(-'+(o._slideIdx*100)+'%)';
  var dots=document.getElementById("pdDots").children;
  for(var i=0;i<dots.length;i++){dots[i].classList.toggle('on',i===o._slideIdx);}
  clearTimeout(slideTimer);
  slideTimer=setTimeout(function(){slidePd(1)},4000);
}
function closeDetail(){
  clearTimeout(slideTimer);
  var o=document.getElementById("pdOverlay");if(o)o.remove()
}
function closePay(){var o=document.getElementById("payOverlay");if(o)o.remove()}
</script>
