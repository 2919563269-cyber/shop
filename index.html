<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LIZHIGANG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:"Noto Sans SC",-apple-system,"Helvetica Neue",sans-serif;font-size:14px;color:#1a1a1a;background:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;width:100%}
img{max-width:100%;display:block;height:auto}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-appearance:none;-webkit-tap-highlight-color:transparent}
a{text-decoration:none;color:inherit}

/* 头部 */
.header{position:sticky;position:-webkit-sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);height:52px;display:flex;align-items:center;border-bottom:1px solid #eee}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:0 12px;width:100%}
.logo{display:flex;align-items:center;gap:8px}
.logo img{width:32px;height:32px;border-radius:50%;object-fit:contain}
.logo span{font-size:17px;font-weight:700;letter-spacing:.1em}
.cart-btn{position:relative;padding:4px}
.cart-btn svg{width:22px;height:22px}
.cart-num{position:absolute;top:0;right:0;background:#1a1a1a;color:#fff;font-size:10px;font-weight:600;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* 模特区 */
.hero{width:100%;height:100vh;height:100svh;background:url("images/lv-bg.jpg") center/cover no-repeat;position:relative}
.hero::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.25)}

/* 分类 */
.cats{position:sticky;position:-webkit-sticky;top:52px;z-index:99;background:#fff;border-bottom:1px solid #eee}
.cats-inner{display:flex;overflow-x:auto;padding:0 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cats-inner::-webkit-scrollbar{display:none}
.ctab{flex-shrink:0;padding:11px 14px;font-size:13px;font-weight:500;color:#999;white-space:nowrap;transition:color .2s}
.ctab.on{color:#1a1a1a;font-weight:700;position:relative}
.ctab.on::after{content:"";position:absolute;bottom:0;left:14px;right:14px;height:2px;background:#1a1a1a}

/* 商品 */
.products{padding:8px;background:#fff;min-height:50vh}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.card{background:#fff}
.card-img{aspect-ratio:3/4;background:#f5f5f5;position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-tag{position:absolute;top:6px;left:6px;background:#1a1a1a;color:#fff;font-size:10px;padding:2px 7px}
.card-info{padding:8px 2px 4px}
.card-name{font-size:12px;font-weight:500;color:#111;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.card-desc{font-size:10px;color:#666;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.card-row{display:flex;align-items:center;justify-content:space-between}
.card-price{font-size:14px;font-weight:700;color:#111}
.card-price s{font-size:10px;font-weight:400;color:#999;margin-left:3px}
.card-btn{padding:4px 9px;font-size:10px;font-weight:500;border:1px solid #111;color:#111;white-space:nowrap}
.card-btn.in{background:#111;color:#fff}

/* 支付 */
.pay-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none}
.pay-overlay.on{display:block}
.pay-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a1a;border-radius:12px;z-index:501;width:90vw;max-width:360px;padding:24px 20px 20px;display:none}
.pay-box.on{display:block}
.pay-close{position:absolute;top:10px;right:14px;color:#999;font-size:24px;padding:0}
.pay-title{font-size:20px;font-weight:600;color:#fff;text-align:center;margin-bottom:20px}
.pay-tabs{display:flex;gap:10px;margin-bottom:20px}
.pay-tab{flex:1;padding:10px;border:1px solid #333;border-radius:8px;color:#999;font-size:14px;font-weight:500;text-align:center;transition:all .2s}
.pay-tab.on{border-color:#fff;color:#fff;background:rgba(255,255,255,.08)}
.pay-qr{text-align:center;display:none}
.pay-qr.on{display:block}
.pay-qr .qr-img{display:inline-block;padding:14px;background:#fff;border-radius:12px;margin-bottom:10px}
.pay-qr .qr-img img{width:180px;height:180px}
.pay-qr .qr-label{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px}
.pay-qr .qr-hint{font-size:12px;color:#999;margin-bottom:4px}
.pay-qr .qr-amount{font-size:26px;font-weight:700;color:#fff}
.pay-note{text-align:center;padding-top:14px;border-top:1px solid #333;margin-top:4px}
.pay-note p{font-size:12px;color:#999;line-height:1.8}

/* 底部 */
.footer{background:#111;color:#fff;padding:20px 16px 30px;text-align:center;font-size:12px;letter-spacing:.04em}

/* 购物车 */
.co{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none}
.co.on{display:block}
.cp{position:fixed;top:0;right:-100%;width:85vw;max-width:380px;height:100vh;height:100svh;background:#fff;z-index:201;display:flex;flex-direction:column;transition:right .3s}
.cp.on{right:0}
.cp-top{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #eee}
.cp-top h3{font-size:16px;font-weight:600}
.cp-top button{font-size:22px;color:#999;padding:0}
.cp-list{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.cp-empty{text-align:center;color:#999;padding-top:60px;font-size:14px}
.ci{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;align-items:flex-start}
.ci-img{width:64px;height:86px;flex-shrink:0;background:#f5f5f5}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:12px;font-weight:500;color:#111;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ci-price{font-size:14px;font-weight:600;color:#111;margin-bottom:4px}
.ci-qty{display:flex;align-items:center;gap:6px}
.ci-qty button{width:24px;height:24px;border:1px solid #ddd;font-size:14px;display:flex;align-items:center;justify-content:center}
.ci-qty span{font-size:13px;min-width:20px;text-align:center}
.ci-del{font-size:20px;color:#ccc;padding:2px}
.cp-bottom{padding:16px;border-top:1px solid #eee}
.cp-row{display:flex;justify-content:space-between;align-items:center;font-size:15px;margin-bottom:12px}
.cp-price{font-size:18px;font-weight:700;color:#111}
.cp-bottom>button{display:block;width:100%;padding:14px;background:#111;color:#fff;font-size:15px;font-weight:500;letter-spacing:.06em}

/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%)translateY(20px);background:#111;color:#fff;padding:10px 24px;font-size:13px;border-radius:4px;z-index:300;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%)translateY(0)}

/* 桌面居中 */
@media(min-width:431px){body{max-width:430px;margin:0 auto;box-shadow:0 0 30px rgba(0,0,0,.1)}}
</style>
</head>
<body>

<section class="hero"></section>

<footer class="footer">客服微信：njknjk22002</footer>

<div class="toast" id="toast"></div>

<script>
const products=[

{id:29,name:"大鹅排骨羽绒服",cat:"外套",price:269,orig:699,img:"images/product_22.jpg",desc:"秋季轻奢新品高品质现货",tag:"新品"},

{id:2,name:"克罗心复古黑色牛仔裤",cat:"裤子",price:69,orig:199,img:"images/product_2.jpg",desc:"独家版本克罗心十字架男士休闲",tag:"热卖"},
{id:3,name:"美式高街牛仔短裤",cat:"裤子",price:59,orig:169,img:"images/product_3.jpg",desc:"夏季宽松直筒松紧腰潮流",tag:"新品"},

{id:6,name:"普拉达浅蓝三角标牛仔裤",cat:"裤子",price:79,orig:229,img:"images/product_6.jpg",desc:"高版本揭阳轻奢三角标",tag:"热卖"},

{id:19,name:"天丝醋酸轻奢休闲裤",cat:"裤子",price:128,orig:329,img:"images/product_11.jpg",desc:"高版本新款直筒薄款微宽松",tag:"新品"},
{id:25,name:"普拉达户外弯刀休闲长裤",cat:"裤子",price:88,orig:239,img:"images/product_13.jpg",desc:"秋冬薄款三角休闲裤",tag:"新品"},
{id:26,name:"普拉达黑色直筒牛仔裤",cat:"裤子",price:78,orig:219,img:"images/product_14.jpg",desc:"最新款轻奢高端潮牌修身",tag:"热卖"},
{id:1,name:"Onitsuka Tiger MEXICO 66 亚瑟士鬼冢虎复古鞋",cat:"鞋子",price:150,orig:399,img:"images/product_1.jpg",desc:"高端品质工厂直发复古经典",tag:"热卖"},
{id:12,name:"字母logo刺绣圆领短袖T恤",cat:"短袖",price:79.9,orig:219,img:"images/product_22.jpg",desc:"纯原1:1爆款高版本百搭",tag:"热卖"},
{id:13,name:"普拉达圆领刺绣短袖T恤",cat:"短袖",price:58,orig:169,img:"images/product_21.jpg",desc:"高品质T恤三标齐全",tag:"热卖"},
{id:14,name:"梅花刺绣Polo衫短袖",cat:"短袖",price:35.8,orig:119,img:"images/product_20.jpg",desc:"新款百搭修身Polo衫",tag:"热卖"},
{id:20,name:"广州轻奢满印字母短袖T恤",cat:"短袖",price:99,orig:269,img:"images/product_19.jpg",desc:"最高版本商务男女同款",tag:"新品"},
{id:21,name:"普拉达立体剪裁短袖T恤",cat:"短袖",price:65,orig:189,img:"images/product_18.jpg",desc:"新款纯棉超高版本男女同款",tag:"新品"},
{id:22,name:"普拉达Polo衫三角标短袖",cat:"短袖",price:55,orig:159,img:"images/product_17.jpg",desc:"高版本轻奢潮牌商务款",tag:"新品"}
];
const catList=["all","卫衣","外套","裤子","鞋子","帽子","短袖"];
function getCategories(){return catList}
var cart=JSON.parse(localStorage.getItem("sc")||"[]"),cur="all";
function init(){renderCats();renderProds("all");updateCart()}
function renderCats(){var t="";catList.forEach(function(c){t+='<button class="ctab'+(c==="all"?" on":"")+'" data-c="'+c+'">'+(c==="all"?"全部":c)+'</button>'});document.getElementById("categoryTabs").innerHTML=t;document.querySelectorAll(".ctab").forEach(function(b){b.onclick=function(){document.querySelectorAll(".ctab").forEach(function(x){x.classList.remove("on")});this.classList.add("on");cur=this.dataset.c;renderProds(cur)}})}
function cardHTML(p){var i=cart.find(function(c){return c.id===p.id});return'<div class="card"><div class="card-img">'+(p.img?'<img src="'+p.img+'" alt="'+p.name+'" loading="lazy" onerror="this.parentElement.textContent=\'📦\'">':'📦')+(p.tag?'<span class="card-tag">'+p.tag+'</span>':'')+'</div><div class="card-info"><div class="card-name">'+p.name+'</div><div class="card-desc">'+p.desc+'</div><div class="card-row"><div class="card-price">¥'+p.price+'<s>¥'+p.orig+'</s></div><button class="card-btn'+(i?' in':'')+'" onclick="addCart('+p.id+',this)">'+(i?'✓':'+')+'</button></div></div></div>'}
function renderProds(cat){var l=cat==="all"?products:products.filter(function(p){return p.cat===cat});document.getElementById("productsGrid").innerHTML=l.map(cardHTML).join("")}
function addCart(id,btn){var p=products.find(function(x){return x.id===id});if(!p)return;var e=cart.find(function(c){return c.id===id});if(e)e.qty+=1;else cart.push({id,qty:1});save();updateCart();renderProds(cur);toast(p.name+" 已加入购物袋")}
function removeCart(id){cart=cart.filter(function(c){return c.id!==id});save();updateCart();renderProds(cur);renderCartItems()}
function chgQty(id,d){var c=cart.find(function(x){return x.id===id});if(!c)return;c.qty+=d;if(c.qty<=0){removeCart(id);return}save();updateCart();renderCartItems()}
function save(){localStorage.setItem("sc",JSON.stringify(cart))}
function updateCart(){var n=cart.reduce(function(s,c){return s+c.qty},0),el=document.getElementById("cartCount");el.textContent=n;el.style.display=n>0?"flex":"none";renderCartItems()}
function renderCartItems(){var items=document.getElementById("cartItems"),ft=document.getElementById("cartFooter");if(cart.length===0){items.innerHTML='<p class="cp-empty">购物袋是空的</p>';ft.style.display="none";return}ft.style.display="block";var total=cart.reduce(function(s,c){var p=products.find(function(x){return x.id===c.id});return s+(p?p.price*c.qty:0)},0);document.getElementById("cartTotal").textContent="¥"+total.toLocaleString("zh-CN");items.innerHTML=cart.map(function(c){var p=products.find(function(x){return x.id===c.id});if(!p)return"";return'<div class="ci"><div class="ci-img">'+(p.img?'<img src="'+p.img+'" alt="'+p.name+'" loading="lazy">':'📦')+'</div><div class="ci-info"><div class="ci-name">'+p.name+'</div><div class="ci-price">¥'+(p.price*c.qty).toLocaleString()+'</div><div class="ci-qty"><button onclick="chgQty('+c.id+',-1)">−</button><span>'+c.qty+'</span><button onclick="chgQty('+c.id+',1)">+</button></div></div><button class="ci-del" onclick="removeCart('+c.id+')">&times;</button></div>'}).join("")}
function toggleCart(){var p=document.getElementById("cartPanel"),o=document.getElementById("cartOverlay");if(p.classList.contains("on")){p.classList.remove("on");o.classList.remove("on")}else{p.classList.add("on");o.classList.add("on")}}
function checkout(){if(cart.length===0)return;toggleCart();showPayModal()}
var tt;function toast(m){clearTimeout(tt);var e=document.getElementById("toast");e.textContent=m;e.className="toast";void e.offsetWidth;e.classList.add("show");tt=setTimeout(function(){e.classList.remove("show")},2500)}
document.addEventListener("DOMContentLoaded",init);

// 支付弹窗
function showPayModal(){
  var total=cart.reduce(function(s,c){var p=products.find(function(x){return x.id===c.id});return s+(p?p.price*c.qty:0)},0);
  var overlay=document.createElement("div");overlay.className="pay-overlay on";overlay.id="payOverlay";
  overlay.innerHTML='<div class="pay-box on" id="payBox"><button class="pay-close" onclick="closePay()">&times;</button><div class="pay-title">选择支付方式</div><div class="pay-tabs"><button class="pay-tab on" onclick="switchPay(\"wx\")">💚 微信支付</button><button class="pay-tab" onclick="switchPay(\"zfb\")">💙 支付宝</button></div><div class="pay-qr on" id="payWx"><div class="qr-img"><svg width="180" height="180" viewBox="0 0 180 180"><rect width="180" height="180" fill="#fff"/><text x="90" y="90" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#07C160">微信扫码支付</text></svg></div><div class="qr-label">微信支付</div><div class="qr-hint">请使用微信扫一扫</div><div class="qr-amount">¥'+total.toLocaleString("zh-CN")+'</div></div><div class="pay-qr" id="payZfb"><div class="qr-img"><svg width="180" height="180" viewBox="0 0 180 180"><rect width="180" height="180" fill="#fff"/><text x="90" y="90" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#1677FF">支付宝扫码支付</text></svg></div><div class="qr-label">支付宝</div><div class="qr-hint">请使用支付宝扫一扫</div><div class="qr-amount">¥'+total.toLocaleString("zh-CN")+'</div></div><div class="pay-note"><p>支付遇到问题？<br>联系客服微信：<strong style="color:#07C160">njknjk22002</strong></p></div></div>';
  document.body.appendChild(overlay);
  overlay.onclick=function(e){if(e.target===overlay)closePay()};
  window._payTab="wx";
}
function closePay(){var o=document.getElementById("payOverlay");if(o)o.remove()}
function switchPay(t){window._payTab=t;document.querySelectorAll(".pay-tab").forEach(function(b){b.classList.toggle("on",b.textContent.includes(t==="wx"?"微信":"支付宝"))});document.getElementById("payWx").classList.toggle("on",t==="wx");document.getElementById("payZfb").classList.toggle("on",t==="zfb")}
</script>
