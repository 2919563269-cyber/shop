<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Noto Sans SC",-apple-system,"Helvetica Neue",sans-serif;
  font-size:15px;color:#1a1a1a;
  background:#fafafa;
  -webkit-font-smoothing:antialiased;
  line-height:1.8;
}
.tags{
  padding:16px 20px 8px;
  display:flex;overflow-x:auto;
  gap:10px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
  background:#fafafa;
  position:sticky;top:0;z-index:10;
}
.tags::-webkit-scrollbar{display:none}
.tag{
  flex-shrink:0;padding:8px 16px;
  border-radius:20px;font-size:13px;font-weight:500;
  color:#888;
  border:1px solid #ddd;
  transition:all .2s;white-space:nowrap;

.tag.on,.tag:active{background:#ff6b35;color:#fff;border-color:#ff6b35}
.container{max-width:680px;margin:0 auto;padding:40px 20px 60px}
.back{
  display:inline-flex;align-items:center;gap:6px;
  color:#999;font-size:14px;text-decoration:none;margin-bottom:32px;
}
h1{font-size:24px;font-weight:700;line-height:1.4;margin-bottom:8px;color:#111}
.meta{font-size:13px;color:#999;margin-bottom:40px}
p{font-size:15px;color:#555;line-height:1.9;margin-bottom:16px}
.soon{text-align:center;padding:80px 0;color:#bbb;font-size:16px}
.soon-icon{font-size:48px;margin-bottom:16px}
.footer-note{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid #eee;color:#999;font-size:13px}
.login-gate{position:fixed;inset:0;background:#0f0f0f;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column}
.login-gate.hidden{display:none}
.login-box{text-align:center;padding:40px 24px;max-width:320px;width:100%}
.login-logo{font-size:28px;font-weight:700;color:#fff;letter-spacing:.08em;margin-bottom:8px}
.login-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:32px}
.login-input{width:100%;padding:14px 18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-size:16px;text-align:center;outline:none;margin-bottom:16px;letter-spacing:.2em}
.login-input:focus{border-color:#ff6b35}
.login-input::placeholder{color:rgba(255,255,255,.2);letter-spacing:0}
.login-btn{width:100%;padding:14px;background:#ff6b35;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.login-btn:active{background:#e55a2b}
.login-err{color:#ff4444;font-size:13px;margin-top:12px;display:none}
</style>
</head>
<body>

<div class="login-gate" id="loginGate">
  <div class="login-box">
    <div class="login-logo">餐饮增长实验室</div>
    <div class="login-sub">请输入访问密码</div>
    <input type="password" class="login-input" id="pwdInput" placeholder="输入密码" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="login-btn" onclick="checkPwd()">进入</button>
    <div class="login-err" id="loginErr">密码错误，请重试</div>
  </div>
</div>
<script>
var WEEK_PWDS=['177','277','377','477','577','677','777'];
var SITE_PWD=WEEK_PWDS[new Date().getDay()===0?6:new Date().getDay()-1];
(function(){
  if(localStorage.getItem('_site_auth')===SITE_PWD){
    var g=document.getElementById('loginGate');
    if(g)g.classList.add('hidden');
  }
})();
function checkPwd(){
  var v=document.getElementById('pwdInput').value.trim();
  if(v===SITE_PWD){
    localStorage.setItem('_site_auth',SITE_PWD);
    document.getElementById('loginGate').classList.add('hidden');
    document.getElementById('loginErr').style.display='none';
  }else{
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwdInput').value='';
  }
}
</script>
