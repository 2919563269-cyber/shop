<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算 - LIZHIGANG</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="checkout-page">
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo-area"><img src="images/logo.jpg" alt="LIZHIGANG" class="logo-img"><span class="logo-text">LIZHIGANG</span></a>
            <a href="index.html" class="back-link">返回</a>
        </div>
    </header>

    <section class="checkout">
        <div class="container">
            <h1 class="checkout-title">确认订单</h1>

            <div class="checkout-grid">
                <div class="checkout-main">
                    <!-- 订单商品 -->
                    <div class="checkout-section">
                        <h3 class="checkout-section-title">订单商品</h3>
                        <div class="checkout-items" id="checkoutItems"></div>
                    </div>

                    <!-- 收货信息 -->
                    <div class="checkout-section">
                        <h3 class="checkout-section-title">收货信息</h3>
                        <form id="orderForm" onsubmit="submitOrder(event)">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>姓名</label>
                                    <input type="text" placeholder="收货人姓名" required>
                                </div>
                                <div class="form-group">
                                    <label>电话</label>
                                    <input type="text" placeholder="手机号码" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>地址</label>
                                <textarea placeholder="省/市/区/详细地址" rows="2" required></textarea>
                            </div>
                            <div class="form-group">
                                <label>备注（选填）</label>
                                <input type="text" placeholder="尺码、颜色等要求">
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 价格汇总 -->
                <div class="checkout-sidebar">
                    <div class="summary-card">
                        <h3 class="checkout-section-title">价格明细</h3>
                        <div class="summary-rows" id="summaryRows"></div>
                        <div class="summary-divider"></div>
                        <div class="summary-total">
                            <span>合计</span>
                            <span class="summary-total-price" id="summaryTotal">¥0</span>
                        </div>
                        <button class="btn btn-dark btn-full" onclick="document.getElementById('orderForm').requestSubmit()">
                            提交订单
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 支付弹窗 -->
    <div class="payment-modal-overlay" id="paymentModal" onclick="closePayment()"></div>
    <div class="payment-modal" id="paymentModalBox">
        <button class="payment-modal-close" onclick="closePayment()">&times;</button>
        <h2 class="payment-title">扫码支付</h2>
        
        <div class="payment-tabs">
            <button class="payment-tab active" onclick="switchPayment('wechat')">
                <span class="payment-tab-icon wechat-icon">&#x1f4f1;</span> 微信支付
            </button>
            <button class="payment-tab" onclick="switchPayment('alipay')">
                <span class="payment-tab-icon alipay-icon">&#x1f4b0;</span> 支付宝
            </button>
        </div>
        
        <div class="payment-qr-area">
            <!-- 微信支付 -->
            <div class="payment-qr-panel active" id="wechatPanel">
                <div class="qr-box" id="wechatQR">
                    <div class="qr-placeholder-large">
                        <svg width="200" height="200" viewBox="0 0 200 200" fill="none">
                            <rect width="200" height="200" fill="#07C160" rx="8"/>
                            <rect x="30" y="30" width="55" height="55" rx="4" fill="#fff"/>
                            <rect x="115" y="30" width="55" height="55" rx="4" fill="#fff"/>
                            <rect x="30" y="115" width="55" height="55" rx="4" fill="#fff"/>
                            <rect x="115" y="115" width="55" height="55" rx="4" fill="#fff"/>
                            <circle cx="100" cy="100" r="12" fill="#fff"/>
                        </svg>
                    </div>
                </div>
                <div class="qr-label">
                    <span class="qr-label-icon" style="color:#07C160">&#x2714;</span>
                    微信扫码支付
                </div>
                <p class="qr-hint">请使用微信扫一扫完成支付</p>
                <p class="qr-amount" id="wechatAmount">¥0.00</p>
            </div>

            <!-- 支付宝 -->
            <div class="payment-qr-panel" id="alipayPanel">
                <div class="qr-box" id="alipayQR">
                    <div class="qr-placeholder-large">
                        <svg width="200" height="200" viewBox="0 0 200 200" fill="none">
                            <rect width="200" height="200" fill="#1677FF" rx="8"/>
                            <rect x="30" y="30" width="55" height="55" rx="4" fill="#fff"/>
                            <rect x="115" y="30" width="55" height="55" rx="4" fill="#fff"/>
                            <rect x="30" y="115" width="55" height="55" rx="4" fill="#fff"/>
                            <rect x="115" y="115" width="55" height="55" rx="4" fill="#fff"/>
                            <circle cx="100" cy="100" r="12" fill="#fff"/>
                        </svg>
                    </div>
                </div>
                <div class="qr-label">
                    <span class="qr-label-icon" style="color:#1677FF">&#x2714;</span>
                    支付宝扫码支付
                </div>
                <p class="qr-hint">请使用支付宝扫一扫完成支付</p>
                <p class="qr-amount" id="alipayAmount">¥0.00</p>
            </div>
        </div>

        <div class="payment-note">
            <p>支付完成后请<strong>截图</strong>联系客服确认</p>
            <p class="payment-cs">客服微信：<strong>njknjk22002</strong></p>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <span class="footer-brand">LIZHIGANG</span>
                <span class="footer-divider">—</span>
                <span>客服微信：njknjk22002</span>
            </div>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="js/data.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
