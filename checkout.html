<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算 — NJK</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">NJK</a>
            <a href="index.html" class="back-link">← 返回</a>
        </div>
    </header>

    <section class="checkout">
        <div class="container">
            <h1 class="checkout-title">结算</h1>

            <div class="checkout-grid">
                <!-- 左侧：订单信息 -->
                <div class="checkout-main">
                    <!-- 订单商品 -->
                    <div class="checkout-section">
                        <h3 class="checkout-section-title">订单商品</h3>
                        <div class="checkout-items" id="checkoutItems"></div>
                    </div>

                    <!-- 收货信息 -->
                    <div class="checkout-section">
                        <h3 class="checkout-section-title">收货信息</h3>
                        <form id="orderForm" onsubmit="submitOrder(event)">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>姓名</label>
                                    <input type="text" placeholder="收货人姓名" required>
                                </div>
                                <div class="form-group">
                                    <label>电话</label>
                                    <input type="text" placeholder="手机号码" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>地址</label>
                                <textarea placeholder="省/市/区/详细地址" rows="2" required></textarea>
                            </div>
                            <div class="form-group">
                                <label>备注（选填）</label>
                                <input type="text" placeholder="尺码、颜色等要求">
                            </div>
                        </form>
                    </div>

                    <!-- 支付方式 -->
                    <div class="checkout-section">
                        <h3 class="checkout-section-title">支付方式</h3>
                        <div class="payment-methods">
                            <label class="payment-option active">
                                <input type="radio" name="payment" value="wechat" checked>
                                <span class="payment-label">微信支付</span>
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment" value="alipay">
                                <span class="payment-label">支付宝</span>
                            </label>
                        </div>
                        <div class="payment-qr" id="paymentQR">
                            <div class="qr-placeholder">
                                <svg width="140" height="140" viewBox="0 0 140 140" fill="none">
                                    <rect width="140" height="140" fill="#F5F5F5"/>
                                    <rect x="20" y="20" width="40" height="40" rx="2" fill="#1A1A1A" fill-opacity="0.1"/>
                                    <rect x="80" y="20" width="40" height="40" rx="2" fill="#1A1A1A" fill-opacity="0.1"/>
                                    <rect x="20" y="80" width="40" height="40" rx="2" fill="#1A1A1A" fill-opacity="0.1"/>
                                    <rect x="80" y="80" width="40" height="40" rx="2" fill="#1A1A1A" fill-opacity="0.1"/>
                                    <rect x="62" y="62" width="16" height="16" rx="2" fill="#1A1A1A" fill-opacity="0.15"/>
                                </svg>
                                <p>请扫码支付</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧：价格汇总 -->
                <div class="checkout-sidebar">
                    <div class="summary-card">
                        <h3 class="checkout-section-title">价格明细</h3>
                        <div class="summary-rows" id="summaryRows"></div>
                        <div class="summary-divider"></div>
                        <div class="summary-total">
                            <span>合计</span>
                            <span class="summary-total-price" id="summaryTotal">¥0</span>
                        </div>
                        <button class="btn btn-dark btn-full" onclick="document.getElementById('orderForm').requestSubmit()">
                            提交订单
                        </button>
                        <p class="summary-note">提交后请截图联系客服确认</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <span class="footer-brand">NJK</span>
                <span class="footer-divider">—</span>
                <span>客服微信：njknjk22002</span>
            </div>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="js/data.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
